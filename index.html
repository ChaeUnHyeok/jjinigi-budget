<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>💑 찌니기 가계부</title>
<style>
:root{
  --bg:#F7F8FA;--card:#FFFFFF;--border:#E8EAF0;
  --accent:#5C6BC0;--accent-light:#E8EAF6;
  --woon:#4A90D9;--woon-light:#E3F0FA;
  --jiyun:#E05C8A;--jiyun-light:#FCE8F0;
  --text:#1A1D2E;--sub:#6B7280;
  --green:#22C55E;--green-light:#DCFCE7;
  --red:#EF4444;--red-light:#FEE2E2;
  --yellow:#F59E0B;--yellow-light:#FEF3C7;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);font-family:'Apple SD Gothic Neo','Noto Sans KR',sans-serif;color:var(--text);font-size:14px;}

#header{background:var(--card);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200;}
.title{font-weight:800;font-size:16px;letter-spacing:-0.5px;}
.sync{font-size:11px;color:var(--sub);margin-top:2px;}
#refresh-btn{background:var(--accent-light);color:var(--accent);border:none;border-radius:8px;padding:6px 12px;cursor:pointer;font-weight:700;font-size:12px;}

#month-bar{background:var(--card);border-bottom:1px solid var(--border);padding:8px 16px;display:flex;align-items:center;gap:6px;position:sticky;top:57px;z-index:190;overflow-x:auto;}
.month-btn{padding:5px 13px;border:1px solid var(--border);background:none;border-radius:99px;cursor:pointer;font-size:12px;color:var(--sub);white-space:nowrap;transition:all .2s;display:flex;align-items:center;gap:4px;}
.month-btn.active{background:var(--accent);color:#fff;border-color:var(--accent);font-weight:700;}
.month-del{font-size:11px;opacity:.6;cursor:pointer;}
.month-del:hover{opacity:1;}
.month-move{font-size:11px;opacity:.5;cursor:pointer;padding:0 1px;}
.month-move:hover{opacity:1;}
#add-month-btn{padding:5px 11px;border:1px dashed var(--border);background:none;border-radius:99px;cursor:pointer;font-size:12px;color:var(--sub);white-space:nowrap;}

#tabs{background:var(--card);border-bottom:1px solid var(--border);display:flex;overflow-x:auto;}
.tab-btn{padding:10px 14px;border:none;background:none;cursor:pointer;font-size:13px;color:var(--sub);font-weight:500;white-space:nowrap;border-bottom:2.5px solid transparent;transition:color .2s;}
.tab-btn.active{color:var(--accent);font-weight:700;border-bottom-color:var(--accent);}

#content{max-width:980px;margin:0 auto;padding:16px;}
.tab-panel{display:none;}
.tab-panel.active{display:block;}

.card{background:var(--card);border-radius:14px;border:1px solid var(--border);padding:16px 18px;box-shadow:0 1px 4px rgba(0,0,0,.05);margin-bottom:14px;}
.card-title{font-weight:700;font-size:14px;margin-bottom:12px;}

.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
.grid-4{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:12px;}
.grid-form{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:8px;margin-bottom:10px;}

.amount-card{border-radius:12px;padding:12px 14px;}
.amount-card .label{font-size:11px;color:var(--sub);margin-bottom:3px;}
.amount-card .value{font-size:18px;font-weight:800;}
.amount-card .sub{font-size:11px;color:var(--sub);margin-top:3px;}

.progress-info{display:flex;justify-content:space-between;font-size:11px;color:var(--sub);margin-bottom:4px;}
.progress-bar{background:var(--border);border-radius:99px;height:7px;}
.progress-fill{height:7px;border-radius:99px;transition:width .4s;}
.progress-sub{font-size:11px;color:var(--sub);margin-top:3px;}
.spending-info{margin-top:8px;font-size:12px;display:flex;gap:16px;flex-wrap:wrap;}

.mini-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px;padding-top:10px;border-top:1px solid var(--border);}
.mini-progress-label{display:flex;justify-content:space-between;font-size:11px;margin-bottom:3px;}
.mini-progress-bar{background:var(--border);border-radius:99px;height:5px;}
.mini-progress-fill{height:5px;border-radius:99px;}

label.field-label{font-size:11px;color:var(--sub);display:block;margin-bottom:3px;}
input,select{border:1px solid var(--border);border-radius:8px;padding:5px 9px;font-size:13px;outline:none;background:var(--card);color:var(--text);width:100%;}
input:focus,select:focus{border-color:var(--accent);}

.add-btn{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:7px 18px;cursor:pointer;font-weight:700;font-size:13px;margin-top:4px;}
.del-btn{background:var(--red-light);color:var(--red);border:none;border-radius:6px;padding:3px 8px;cursor:pointer;font-size:12px;}
.check-btn{background:none;border:1.5px solid var(--border);border-radius:6px;padding:2px 8px;cursor:pointer;font-size:13px;color:var(--sub);}
.check-btn.done{background:var(--green-light);border-color:var(--green);color:var(--green);}

.table-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:13px;}
th{padding:7px 9px;text-align:left;color:var(--sub);font-weight:600;white-space:nowrap;border-bottom:1px solid var(--border);background:var(--bg);}
td{padding:7px 9px;white-space:nowrap;border-bottom:1px solid var(--border);}
tr:nth-child(even) td{background:#FAFBFC;}

.badge{padding:2px 8px;border-radius:12px;font-weight:700;font-size:12px;}
.badge-woon{background:var(--woon-light);color:var(--woon);}
.badge-jiyun{background:var(--jiyun-light);color:var(--jiyun);}
.badge-joint{background:var(--accent-light);color:var(--accent);}

.section-header{display:flex;justify-content:space-between;margin-bottom:10px;}
.s-title{font-weight:700;font-size:14px;}
.s-total{font-weight:700;font-size:14px;color:var(--accent);}

/* 계획 행 - 금액+비고 레이아웃 */
.plan-row{display:flex;align-items:center;gap:6px;margin-bottom:5px;}
.plan-row .p-label{font-size:13px;color:var(--sub);min-width:110px;flex-shrink:0;}
.plan-row .p-amt{position:relative;width:130px;flex-shrink:0;}
.plan-row .p-amt input{padding-right:22px;}
.plan-row .won{position:absolute;right:7px;top:50%;transform:translateY(-50%);font-size:11px;color:var(--sub);}
.plan-row .p-note{flex:1;}
.plan-row .p-pct{font-size:11px;color:var(--sub);min-width:52px;text-align:right;flex-shrink:0;}

.result-row{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--border);font-size:14px;}
.result-row:last-child{border-bottom:none;}
.result-row.bold{font-weight:800;font-size:15px;}

/* 집계 테이블 */
.agg-table{width:100%;border-collapse:collapse;font-size:12px;margin-top:12px;}
.agg-table th{background:var(--bg);padding:5px 8px;color:var(--sub);font-weight:600;border-bottom:1px solid var(--border);text-align:left;}
.agg-table td{padding:5px 8px;border-bottom:1px solid var(--border);}
.agg-table tr:last-child td{border-bottom:none;font-weight:700;}

#loading{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;z-index:999;}
.spinner{width:34px;height:34px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.empty{text-align:center;padding:28px 0;color:var(--sub);font-size:13px;}

@media(max-width:600px){
  .grid-2,.grid-3{grid-template-columns:1fr;}
  .grid-4{grid-template-columns:1fr 1fr;}
  .plan-row .p-note{display:none;}
}
</style>
</head>
<body>

<div id="loading"><div class="spinner"></div><span style="color:var(--sub);font-size:14px">데이터 불러오는 중...</span></div>

<div id="header">
  <div><div class="title">💑 찌니기 가계부</div><div class="sync" id="sync-status">연결 중...</div></div>
  <button id="refresh-btn" onclick="loadAll()">🔄 새로고침</button>
</div>

<div id="month-bar">
  <div id="month-btns" style="display:flex;gap:6px;align-items:center;"></div>
  <button id="add-month-btn" onclick="addMonth()">+ 월 추가</button>
</div>

<div id="tabs">
  <button class="tab-btn active" onclick="switchTab('summary',this)">📊 요약</button>
  <button class="tab-btn" onclick="switchTab('plan',this)">📋 계획</button>
  <button class="tab-btn" onclick="switchTab('living',this)">🏠 생활비</button>
  <button class="tab-btn" onclick="switchTab('jiyun',this)">💗 지윤소비</button>
  <button class="tab-btn" onclick="switchTab('woon',this)">💙 운혁소비</button>
  <button class="tab-btn" onclick="switchTab('parking',this)">🏦 파킹통장</button>
</div>

<div id="content">
  <div id="tab-summary" class="tab-panel active">
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(270px,1fr));gap:14px" id="summary-cards"></div>
  </div>

  <div id="tab-plan" class="tab-panel"><div id="plan-content"></div></div>

  <div id="tab-living" class="tab-panel">
    <div class="card">
      <div class="card-title">새 항목 추가</div>
      <div class="grid-form">
        <div><label class="field-label">날짜</label><input type="date" id="liv-date"/></div>
        <div><label class="field-label">내용</label><input type="text" id="liv-desc" placeholder="내용 입력"/></div>
        <div><label class="field-label">금액(원)</label><input type="number" id="liv-amount" placeholder="0"/></div>
        <div><label class="field-label">지불자</label><select id="liv-payer"><option value="운">운</option><option value="지">지</option></select></div>
        <div><label class="field-label">구분</label><select id="liv-cat"><option>생필품</option><option>교통</option><option>간식</option><option>외식</option><option>식비</option><option>카페</option><option>선물</option><option>필수지출</option><option>기타</option></select></div>
        <div><label class="field-label">지원금</label><select id="liv-support"><option value="X">X</option><option value="O">O</option></select></div>
        <div><label class="field-label">비고</label><input type="text" id="liv-note" placeholder="선택"/></div>
      </div>
      <button class="add-btn" onclick="addLiving()">+ 추가</button>
    </div>
    <div class="card">
      <div class="section-header"><span class="s-title" id="liv-count">생활비 내역</span><span class="s-total" id="liv-total"></span></div>
      <div class="table-wrap"><table><thead><tr><th>날짜</th><th>내용</th><th>금액</th><th>지불자</th><th>구분</th><th>지원금</th><th>비고</th><th>송금완료</th><th></th></tr></thead><tbody id="liv-body"></tbody></table></div>
    </div>
    <div class="card" id="liv-agg-card"></div>
  </div>

  <div id="tab-jiyun" class="tab-panel">
    <div class="card" id="jiyun-progress-card" style="border-top:3px solid var(--jiyun)"></div>
    <div class="card">
      <div class="card-title">새 항목 추가</div>
      <div class="grid-form">
        <div><label class="field-label">날짜</label><input type="date" id="ji-date"/></div>
        <div><label class="field-label">내용</label><input type="text" id="ji-desc" placeholder="내용 입력"/></div>
        <div><label class="field-label">금액(원)</label><input type="number" id="ji-amount" placeholder="0"/></div>
        <div><label class="field-label">필수지출 여부</label><select id="ji-fixed" onchange="updateJiyunCats()"><option value="X">X</option><option value="O">O</option></select></div>
        <div><label class="field-label">세부 구분</label><select id="ji-cat"></select></div>
        <div><label class="field-label">지원금</label><select id="ji-support"><option value="X">X</option><option value="O">O</option></select></div>
        <div><label class="field-label">비고</label><input type="text" id="ji-note" placeholder="선택"/></div>
      </div>
      <button class="add-btn" style="background:var(--jiyun)" onclick="addJiyun()">+ 추가</button>
    </div>
    <div class="card">
      <div class="section-header"><span class="s-title" id="ji-count">지윤 소비 내역</span><span class="s-total" style="color:var(--jiyun)" id="ji-total"></span></div>
      <div class="table-wrap"><table><thead><tr><th>날짜</th><th>내용</th><th>금액</th><th>필수</th><th>구분</th><th>지원금</th><th>비고</th><th></th></tr></thead><tbody id="ji-body"></tbody></table></div>
    </div>
    <div class="card" id="ji-agg-card"></div>
  </div>

  <div id="tab-woon" class="tab-panel">
    <div class="card" id="woon-progress-card" style="border-top:3px solid var(--woon)"></div>
    <div class="card">
      <div class="card-title">새 항목 추가</div>
      <div class="grid-form">
        <div><label class="field-label">날짜</label><input type="date" id="wo-date"/></div>
        <div><label class="field-label">내용</label><input type="text" id="wo-desc" placeholder="내용 입력"/></div>
        <div><label class="field-label">금액(원)</label><input type="number" id="wo-amount" placeholder="0"/></div>
        <div><label class="field-label">필수지출 여부</label><select id="wo-fixed" onchange="updateWoonCats()"><option value="X">X</option><option value="O">O</option></select></div>
        <div><label class="field-label">세부 구분</label><select id="wo-cat"></select></div>
        <div><label class="field-label">지원금</label><select id="wo-support"><option value="X">X</option><option value="O">O</option></select></div>
        <div><label class="field-label">비고</label><input type="text" id="wo-note" placeholder="선택"/></div>
      </div>
      <button class="add-btn" style="background:var(--woon)" onclick="addWoon()">+ 추가</button>
    </div>
    <div class="card">
      <div class="section-header"><span class="s-title" id="wo-count">운혁 소비 내역</span><span class="s-total" style="color:var(--woon)" id="wo-total"></span></div>
      <div class="table-wrap"><table><thead><tr><th>날짜</th><th>내용</th><th>금액</th><th>필수</th><th>구분</th><th>지원금</th><th>비고</th><th></th></tr></thead><tbody id="wo-body"></tbody></table></div>
    </div>
    <div class="card" id="wo-agg-card"></div>
  </div>

  <div id="tab-parking" class="tab-panel">
    <div class="grid-3" id="parking-top" style="margin-bottom:14px"></div>
    <div class="card">
      <div class="card-title">새 항목 추가</div>
      <div class="grid-form">
        <div><label class="field-label">날짜</label><input type="date" id="pk-date"/></div>
        <div><label class="field-label">사람</label><select id="pk-person"><option>공동</option><option>지윤</option><option>운혁</option></select></div>
        <div><label class="field-label">내용</label><input type="text" id="pk-desc" placeholder="내용 입력"/></div>
        <div><label class="field-label">수입(원)</label><input type="number" id="pk-income" placeholder="0"/></div>
        <div><label class="field-label">지출(원)</label><input type="number" id="pk-expense" placeholder="0"/></div>
      </div>
      <button class="add-btn" style="background:var(--yellow)" onclick="addParking()">+ 추가</button>
    </div>
    <div class="card">
      <div class="section-header"><span class="s-title" id="pk-count">파킹통장 내역</span><span class="s-total" style="color:var(--yellow)" id="pk-balance"></span></div>
      <div class="table-wrap"><table><thead><tr><th>날짜</th><th>사람</th><th>내용</th><th>수입</th><th>지출</th><th>잔액</th><th></th></tr></thead><tbody id="pk-body"></tbody></table></div>
    </div>
  </div>
</div>

<script>
const API="https://script.google.com/macros/s/AKfycbzMRn_m206G9_Bf2SuqFJFsEXxTAuCQV7MmMK3DfoyEvKcmGTIbQnDjBgOyjrV_wY0F/exec";
const POCKET_LIMIT=300000;

const DEFAULT_PLAN={
  income:{woonSalary:0,woonBonus:0,jiyunSalary:0,jiyunBonus:0},
  housing:{rent:0,management:0,water:0,internet:0},
  transport:{gas:0,carInstall:0,carMaint:0,carInsure:0,carTax:0,carRepair:0,eungpass:0},
  living:{food:0,daily:0},
  health:{woonInsure:0,jiyunInsure:0,woonSoccer:0,woonPilates:0,jiyunPilates:0},
  savings:{woonJT:0,jiyunJT:0},
  pocket:{woon:0,jiyun:0},
  notes:{}
};

let currentMonth="";
let months=[];
let monthData={};
let planSaveTimer=null;

const fmt=n=>(Number(n)||0).toLocaleString('ko-KR');
const num=v=>Number(String(v).replace(/,/g,''))||0;
const pct=(a,b)=>b>0?Math.round(a/b*100):0;
const today=()=>new Date().toISOString().slice(0,10);
const thisMonth=()=>new Date().toISOString().slice(0,7);
const sum=(arr,key)=>arr.reduce((s,r)=>s+num(r[key]||0),0);
const deepCopy=o=>JSON.parse(JSON.stringify(o));

function getMonthData(m){
  if(!monthData[m]) monthData[m]={plan:deepCopy(DEFAULT_PLAN),living:[],jiyun:[],woon:[],parking:[]};
  return monthData[m];
}
function D(){return getMonthData(currentMonth);}

async function apiGet(p){const r=await fetch(API+'?'+new URLSearchParams(p));return r.json();}
async function apiPost(b){const r=await fetch(API,{method:'POST',body:JSON.stringify(b)});return r.json();}

const KEY={
  months:'hb_months',
  plan:m=>`hb_${m}_plan`,
  living:m=>`hb_${m}_living`,
  jiyun:m=>`hb_${m}_jiyun`,
  woon:m=>`hb_${m}_woon`,
  parking:m=>`hb_${m}_parking`,
};

async function saveData(key,data){
  try{await apiPost({action:'saveKey',key,data:JSON.stringify(data)});}catch(e){}
  try{localStorage.setItem(key,JSON.stringify(data));}catch(e){}
}
async function loadData(key){
  try{const r=await apiGet({action:'loadKey',key});if(r.ok&&r.data)return JSON.parse(r.data);}catch(e){}
  try{const v=localStorage.getItem(key);if(v)return JSON.parse(v);}catch(e){}
  return null;
}

async function loadAll(){
  setSyncStatus('🔄 동기화 중...');
  try{
    const saved=await loadData(KEY.months);
    if(saved&&saved.length>0) months=saved;
    else months=[thisMonth()];
    if(!currentMonth||!months.includes(currentMonth)) currentMonth=months[months.length-1];
    await loadMonthData(currentMonth);
    renderMonthBar();
    renderAll();
    setSyncStatus('✅ '+new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'})+' 동기화됨');
  }catch(e){setSyncStatus('⚠️ 오류: '+e.message);}
  document.getElementById('loading').style.display='none';
}

async function loadMonthData(m){
  const [plan,living,jiyun,woon,parking]=await Promise.all([
    loadData(KEY.plan(m)),loadData(KEY.living(m)),
    loadData(KEY.jiyun(m)),loadData(KEY.woon(m)),loadData(KEY.parking(m))
  ]);
  if(!monthData[m]) monthData[m]={plan:deepCopy(DEFAULT_PLAN),living:[],jiyun:[],woon:[],parking:[]};
  if(plan){ monthData[m].plan={...deepCopy(DEFAULT_PLAN),...plan,notes:plan.notes||{}}; }
  if(living) monthData[m].living=living;
  if(jiyun) monthData[m].jiyun=jiyun;
  if(woon) monthData[m].woon=woon;
  if(parking) monthData[m].parking=parking;
}

function setSyncStatus(msg){document.getElementById('sync-status').textContent=msg;}

// ── 월 관리 ──────────────────────────────────────────────
function renderMonthBar(){
  const c=document.getElementById('month-btns');
  c.innerHTML=months.map((m,i)=>`
    <div style="display:flex;align-items:center;gap:2px;">
      <span class="month-move" onclick="moveMonth(${i},-1)" title="왼쪽으로">◀</span>
      <button class="month-btn ${m===currentMonth?'active':''}" onclick="switchMonth('${m}')">
        ${m.slice(0,4)}년 ${m.slice(5,7)}월
        <span class="month-del" onclick="event.stopPropagation();deleteMonth('${m}')" title="삭제">✕</span>
      </button>
      <span class="month-move" onclick="moveMonth(${i},1)" title="오른쪽으로">▶</span>
    </div>
  `).join('');
}

async function switchMonth(m){
  currentMonth=m;
  if(!monthData[m]){setSyncStatus('🔄 로드 중...');await loadMonthData(m);setSyncStatus('✅ 로드됨');}
  renderMonthBar();renderAll();
}

async function moveMonth(idx,dir){
  const newIdx=idx+dir;
  if(newIdx<0||newIdx>=months.length) return;
  [months[idx],months[newIdx]]=[months[newIdx],months[idx]];
  await saveData(KEY.months,months);
  renderMonthBar();
}

async function deleteMonth(m){
  if(!confirm(`${m.slice(0,4)}년 ${m.slice(5,7)}월을 삭제할까요?\n데이터도 함께 삭제됩니다.`)) return;
  months=months.filter(x=>x!==m);
  if(months.length===0) months=[thisMonth()];
  if(currentMonth===m) currentMonth=months[months.length-1];
  delete monthData[m];
  await saveData(KEY.months,months);
  renderMonthBar();renderAll();setSyncStatus('✅ 삭제됨');
}

async function addMonth(){
  const input=prompt('추가할 월을 입력하세요 (예: 2025-08)');
  if(!input||!/^\d{4}-\d{2}$/.test(input)){alert('형식 오류. 예: 2025-08');return;}
  if(months.includes(input)){alert('이미 있는 월입니다.');return;}

  // 가장 가까운 이전 달 계획 복사
  const sorted=[...months].sort();
  let prevPlan=deepCopy(DEFAULT_PLAN);
  for(let i=sorted.length-1;i>=0;i--){
    if(sorted[i]<input&&monthData[sorted[i]]){
      prevPlan=deepCopy(monthData[sorted[i]].plan);break;
    }
  }
  months.push(input);months.sort();
  monthData[input]={plan:prevPlan,living:[],jiyun:[],woon:[],parking:[]};
  await saveData(KEY.months,months);
  await saveData(KEY.plan(input),prevPlan);
  currentMonth=input;
  renderMonthBar();renderAll();
  setSyncStatus('✅ '+input+' 추가됨 (이전 달 계획 복사됨)');
}

}

function planRow(sec,key,label,noNote=false){
  const p=D().plan||{};
  const val=(p[sec]&&p[sec][key]!==undefined)?p[sec][key]:'';

  return `<div class="plan-row">

    <div class="p-amt"><input type="number" value="${val}" placeholder="0" oninput="updatePlan('${sec}','${key}',this.value)"/><span class="won">원</span></div>
    ${noNote?'':`<div class="p-note"><input type="text" value="${noteVal}" placeholder="비고" style="font-size:12px;" oninput="updatePlanNote('${sec}','${key}',this.value)"/></div>`}

}

function updatePlan(sec,key,val){
  if(!D().plan[sec]) D().plan[sec]={};
  D().plan[sec][key]=num(val);
  clearTimeout(planSaveTimer);
  planSaveTimer=setTimeout(async()=>{
    setSyncStatus('☁️ 저장 중...');
    await saveData(KEY.plan(currentMonth),D().plan);
    setSyncStatus('✅ 저장됨');
    renderSummary();renderPlan();

function updatePlanNote(sec,key,val){
  if(!D().plan.notes) D().plan.notes={};

function updateJiyunCats(){
  const fixed=document.getElementById('ji-fixed').value==='O';
  document.getElementById('ji-cat').innerHTML=(fixed?JIYUN_FIXED:JIYUN_VAR).map(c=>`<option>${c}</option>`).join('');
}
function renderJiyun(){
  const d=D(),p=d.plan;
  const jiPlan=num(p.housing.rent)+num(p.housing.management)+num(p.housing.water)+num(p.housing.internet)+num(p.transport.eungpass)+num(p.living.food)+num(p.living.daily)+num(p.health.jiyunInsure)+num(p.health.jiyunPilates)+num(p.savings.jiyunJT)+num(p.pocket.jiyun);
  const jiUsed=sum(d.jiyun,'금액'),jiSup=d.jiyun.filter(r=>r['지원금여부']==='O').reduce((s,r)=>s+num(r['금액']),0);
  const essUsed=d.jiyun.filter(r=>r['필수지출여부']==='O').reduce((s,r)=>s+num(r['금액']),0);
  const pktUsed=d.jiyun.filter(r=>r['필수지출여부']==='X').reduce((s,r)=>s+num(r['금액']),0);
  document.getElementById('jiyun-progress-card').innerHTML=`
    ${progressHTML(jiUsed,jiPlan,'var(--jiyun)')}${spendingInfoHTML(jiUsed,jiSup,'var(--jiyun)')}
    <div class="mini-grid">
      <div style="font-size:12px;font-weight:700;color:var(--sub);grid-column:1/-1;margin-bottom:-4px">세부 달성률</div>
      ${miniProgressHTML('📌 필수지출',essUsed,Math.max(jiPlan-POCKET_LIMIT,1),'var(--accent)')}
      ${miniProgressHTML('💳 용돈',pktUsed,POCKET_LIMIT,'var(--jiyun)')}
    </div>`;
  const rows=[...d.jiyun].reverse();
  document.getElementById('ji-count').textContent=`지윤 소비 내역 (${d.jiyun.length}건)`;
  document.getElementById('ji-total').textContent=`합계 ${fmt(jiUsed)}원`;
  const tbody=document.getElementById('ji-body');
  if(!rows.length){tbody.innerHTML=`<tr><td colspan="8" class="empty">기록이 없습니다.</td></tr>`;}
  else tbody.innerHTML=rows.map(r=>`<tr>
    <td>${r['날짜']}</td><td>${r['내용']}</td><td>${fmt(r['금액'])}원</td>
    <td style="color:${r['필수지출여부']==='O'?'var(--jiyun)':'var(--sub)'}">${r['필수지출여부']}</td>
    <td>${r['세부구분']}</td>
    <td style="color:${r['지원금여부']==='O'?'var(--green)':'var(--sub)'}">${r['지원금여부']}</td>
    <td>${r['비고']||''}</td>
    <td><button class="del-btn" onclick="deleteJiyun('${r['id']}')">삭제</button></td>
  </tr>`).join('');
  document.getElementById('ji-agg-card').innerHTML=aggTableDetailHTML(d.jiyun);
}
async function addJiyun(){
  const desc=document.getElementById('ji-desc').value.trim(),amount=document.getElementById('ji-amount').value;
  if(!desc||!amount){alert('내용과 금액을 입력해주세요.');return;}
  const row={id:Date.now(),날짜:document.getElementById('ji-date').value,내용:desc,금액:num(amount),필수지출여부:document.getElementById('ji-fixed').value,세부구분:document.getElementById('ji-cat').value,지원금여부:document.getElementById('ji-support').value,비고:document.getElementById('ji-note').value};
  D().jiyun.push(row);
  await saveData(KEY.jiyun(currentMonth),D().jiyun);
  document.getElementById('ji-desc').value='';document.getElementById('ji-amount').value='';document.getElementById('ji-note').value='';
  renderJiyun();renderSummary();setSyncStatus('✅ 저장됨');
}
async function deleteJiyun(id){
  if(!confirm('삭제할까요?'))return;
  getMonthData(currentMonth).jiyun=D().jiyun.filter(r=>String(r['id'])!==String(id));
  await saveData(KEY.jiyun(currentMonth),D().jiyun);
  renderJiyun();renderSummary();setSyncStatus('✅ 저장됨');
}

// ── 파킹통장 ─────────────────────────────────────────────
function renderParking(){
  const rows=D().parking;
  const pkBal=rows.length>0?num(rows[rows.length-1]['잔액']):0;
  const pkIn=rows.reduce((s,r)=>s+num(r['수입']),0),pkOut=rows.reduce((s,r)=>s+num(r['지출']),0);
  document.getElementById('parking-top').innerHTML=`
    ${amountCardHTML('현재 잔액',pkBal,'var(--yellow)','var(--yellow-light)')}
    ${amountCardHTML('총 입금',pkIn,'var(--green)','var(--green-light)')}
    ${amountCardHTML('총 출금',pkOut,'var(--red)','var(--red-light)')}`;
  document.getElementById('pk-count').textContent=`파킹통장 내역 (${rows.length}건)`;
  document.getElementById('pk-balance').textContent=`잔액 ${fmt(pkBal)}원`;
  const tbody=document.getElementById('pk-body');
  if(!rows.length){tbody.innerHTML=`<tr><td colspan="7" class="empty">기록이 없습니다.</td></tr>`;return;}
  tbody.innerHTML=[...rows].reverse().map(r=>{
    const person=r['사람'],bc=person==='지윤'?'badge-jiyun':person==='운혁'?'badge-woon':'badge-joint';
    return `<tr>
      <td>${r['날짜']}</td><td><span class="badge ${bc}">${person}</span></td><td>${r['내용']}</td>
      <td>${r['수입']?`<span style="color:var(--green)">+${fmt(r['수입'])}원</span>`:'-'}</td>
      <td>${r['지출']?`<span style="color:var(--red)">-${fmt(r['지출'])}원</span>`:'-'}</td>
      <td><strong>${fmt(r['잔액'])}원</strong></td>
      <td><button class="del-btn" onclick="deleteParking('${r['id']}')">삭제</button></td>
    </tr>`;
  }).join('');
}
async function addParking(){
  const desc=document.getElementById('pk-desc').value.trim();
  if(!desc){alert('내용을 입력해주세요.');return;}
  const income=num(document.getElementById('pk-income').value),expense=num(document.getElementById('pk-expense').value);
  const prevBal=D().parking.length>0?num(D().parking[D().parking.length-1]['잔액']):0;
  const row={id:Date.now(),날짜:document.getElementById('pk-date').value,사람:document.getElementById('pk-person').value,내용:desc,수입:income||'',지출:expense||'',잔액:prevBal+income-expense};
  D().parking.push(row);
  await saveData(KEY.parking(currentMonth),D().parking);
  document.getElementById('pk-desc').value='';document.getElementById('pk-income').value='';document.getElementById('pk-expense').value='';
  renderParking();renderSummary();setSyncStatus('✅ 저장됨');
}
async function deleteParking(id){
  if(!confirm('삭제할까요?'))return;
  let bal=0;
  getMonthData(currentMonth).parking=D().parking.filter(r=>String(r['id'])!==String(id)).map(r=>{bal=bal+num(r['수입'])-num(r['지출']);return{...r,잔액:bal};});
  await saveData(KEY.parking(currentMonth),D().parking);
  renderParking();renderSummary();setSyncStatus('✅ 저장됨');
}
