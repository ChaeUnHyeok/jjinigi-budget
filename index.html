<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>💑 우리 가계부</title>
<style>
  :root {
    --bg: #F7F8FA;
    --card: #FFFFFF;
    --border: #E8EAF0;
    --accent: #5C6BC0;
    --accent-light: #E8EAF6;
    --woon: #4A90D9;
    --woon-light: #E3F0FA;
    --jiyun: #E05C8A;
    --jiyun-light: #FCE8F0;
    --text: #1A1D2E;
    --sub: #6B7280;
    --green: #22C55E;
    --green-light: #DCFCE7;
    --red: #EF4444;
    --red-light: #FEE2E2;
    --yellow: #F59E0B;
    --yellow-light: #FEF3C7;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif; color: var(--text); font-size: 14px; }

  /* 헤더 */
  #header {
    background: var(--card); border-bottom: 1px solid var(--border);
    padding: 14px 20px; display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
  }
  #header .title { font-weight: 800; font-size: 17px; letter-spacing: -0.5px; }
  #header .sync { font-size: 11px; color: var(--sub); margin-top: 3px; }
  #refresh-btn {
    background: var(--accent-light); color: var(--accent); border: none;
    border-radius: 8px; padding: 6px 14px; cursor: pointer; font-weight: 700; font-size: 12px;
  }

  /* 탭 */
  #tabs {
    background: var(--card); border-bottom: 1px solid var(--border);
    display: flex; overflow-x: auto;
  }
  .tab-btn {
    padding: 11px 16px; border: none; background: none; cursor: pointer;
    font-size: 13px; color: var(--sub); font-weight: 500; white-space: nowrap;
    border-bottom: 2.5px solid transparent; transition: color .2s;
  }
  .tab-btn.active { color: var(--accent); font-weight: 700; border-bottom-color: var(--accent); }

  /* 콘텐츠 */
  #content { max-width: 960px; margin: 0 auto; padding: 20px 16px; }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* 카드 */
  .card {
    background: var(--card); border-radius: 14px; border: 1px solid var(--border);
    padding: 18px 20px; box-shadow: 0 1px 4px rgba(0,0,0,0.05); margin-bottom: 14px;
  }
  .card-title { font-weight: 700; font-size: 14px; margin-bottom: 12px; }

  /* 그리드 */
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
  .grid-4 { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; }
  .grid-form { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin-bottom: 12px; }

  /* 금액 카드 */
  .amount-card {
    border-radius: 12px; padding: 14px 16px;
  }
  .amount-card .label { font-size: 12px; color: var(--sub); margin-bottom: 4px; }
  .amount-card .value { font-size: 20px; font-weight: 800; }
  .amount-card .sub { font-size: 11px; color: var(--sub); margin-top: 4px; }

  /* 진행바 */
  .progress-info { display: flex; justify-content: space-between; font-size: 11px; color: var(--sub); margin-bottom: 4px; }
  .progress-bar { background: var(--border); border-radius: 99px; height: 7px; }
  .progress-fill { height: 7px; border-radius: 99px; transition: width .4s; }
  .progress-sub { font-size: 11px; color: var(--sub); margin-top: 4px; }

  /* 폼 */
  label.field-label { font-size: 11px; color: var(--sub); display: block; margin-bottom: 4px; }
  input, select {
    border: 1px solid var(--border); border-radius: 8px; padding: 6px 10px;
    font-size: 13px; outline: none; background: var(--card); color: var(--text);
    width: 100%;
  }
  input:focus, select:focus { border-color: var(--accent); }

  /* 버튼 */
  .add-btn {
    background: var(--accent); color: #fff; border: none; border-radius: 8px;
    padding: 8px 20px; cursor: pointer; font-weight: 700; font-size: 13px; margin-top: 4px;
  }
  .del-btn {
    background: var(--red-light); color: var(--red); border: none; border-radius: 6px;
    padding: 3px 8px; cursor: pointer; font-size: 12px;
  }

  /* 테이블 */
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { padding: 8px 10px; text-align: left; color: var(--sub); font-weight: 600; white-space: nowrap; border-bottom: 1px solid var(--border); background: var(--bg); }
  td { padding: 8px 10px; white-space: nowrap; border-bottom: 1px solid var(--border); }
  tr:nth-child(even) td { background: #FAFBFC; }

  /* 배지 */
  .badge { padding: 2px 8px; border-radius: 12px; font-weight: 700; font-size: 12px; }
  .badge-woon { background: var(--woon-light); color: var(--woon); }
  .badge-jiyun { background: var(--jiyun-light); color: var(--jiyun); }
  .badge-joint { background: var(--accent-light); color: var(--accent); }

  /* 계획 행 */
  .plan-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  .plan-row span { font-size: 13px; color: var(--sub); min-width: 130px; flex-shrink: 0; }
  .plan-row .amount-wrap { position: relative; flex: 1; }
  .plan-row input { padding-right: 28px; }
  .plan-row .won { position: absolute; right: 8px; top: 50%; transform: translateY(-50%); font-size: 12px; color: var(--sub); }

  /* 섹션 헤더 */
  .section-header { display: flex; justify-content: space-between; margin-bottom: 12px; }
  .section-header .s-title { font-weight: 700; font-size: 14px; }
  .section-header .s-total { font-weight: 700; font-size: 14px; color: var(--accent); }

  /* 결산 */
  .result-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border); font-size: 14px; }
  .result-row:last-child { border-bottom: none; }
  .result-row.total { font-weight: 800; font-size: 15px; }

  /* 로딩 */
  #loading {
    position: fixed; inset: 0; background: var(--bg);
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; z-index: 999;
  }
  .spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .empty { text-align: center; padding: 30px 0; color: var(--sub); font-size: 13px; }

  @media (max-width: 600px) {
    .grid-2, .grid-3 { grid-template-columns: 1fr; }
    .grid-4 { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <span style="color:var(--sub);font-size:14px">데이터 불러오는 중...</span>
</div>

<!-- 헤더 -->
<div id="header">
  <div>
    <div class="title">💑 우리 가계부</div>
    <div class="sync" id="sync-status">연결 중...</div>
  </div>
  <button id="refresh-btn" onclick="loadAll()">🔄 새로고침</button>
</div>

<!-- 탭 -->
<div id="tabs">
  <button class="tab-btn active" onclick="switchTab('summary')">📊 요약</button>
  <button class="tab-btn" onclick="switchTab('plan')">📋 계획</button>
  <button class="tab-btn" onclick="switchTab('living')">🏠 생활비</button>
  <button class="tab-btn" onclick="switchTab('jiyun')">💗 지윤소비</button>
  <button class="tab-btn" onclick="switchTab('woon')">💙 운혁소비</button>
  <button class="tab-btn" onclick="switchTab('parking')">🏦 파킹통장</button>
</div>

<!-- 콘텐츠 -->
<div id="content">

  <!-- 요약 탭 -->
  <div id="tab-summary" class="tab-panel active">
    <div class="grid-4" id="summary-top" style="margin-bottom:14px"></div>
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:14px" id="summary-cards"></div>
  </div>

  <!-- 계획 탭 -->
  <div id="tab-plan" class="tab-panel">
    <div id="plan-content"></div>
  </div>

  <!-- 생활비 탭 -->
  <div id="tab-living" class="tab-panel">
    <div class="card">
      <div class="card-title">새 항목 추가</div>
      <div class="grid-form">
        <div><label class="field-label">날짜</label><input type="date" id="liv-date" /></div>
        <div><label class="field-label">내용</label><input type="text" id="liv-desc" placeholder="내용 입력" /></div>
        <div><label class="field-label">금액 (원)</label><input type="number" id="liv-amount" placeholder="0" /></div>
        <div><label class="field-label">지불자</label>
          <select id="liv-payer"><option value="운">운</option><option value="지">지</option></select>
        </div>
        <div><label class="field-label">구분</label>
          <select id="liv-cat">
            <option>생필품</option><option>교통</option><option>간식</option><option>외식</option>
            <option>식비</option><option>카페</option><option>선물</option><option>필수지출</option><option>기타</option>
          </select>
        </div>
        <div><label class="field-label">지원금</label>
          <select id="liv-support"><option value="X">X</option><option value="O">O</option></select>
        </div>
        <div><label class="field-label">비고</label><input type="text" id="liv-note" placeholder="선택" /></div>
      </div>
      <button class="add-btn" onclick="addLiving()">+ 추가</button>
    </div>
    <div class="card">
      <div class="section-header">
        <span class="s-title" id="liv-count">생활비 내역</span>
        <span class="s-total" id="liv-total"></span>
      </div>
      <div class="table-wrap"><table id="liv-table"><thead><tr>
        <th>날짜</th><th>내용</th><th>금액</th><th>지불자</th><th>구분</th><th>지원금</th><th>비고</th><th></th>
      </tr></thead><tbody id="liv-body"></tbody></table></div>
    </div>
  </div>

  <!-- 지윤소비 탭 -->
  <div id="tab-jiyun" class="tab-panel">
    <div class="card" id="jiyun-progress-card" style="border-top:3px solid var(--jiyun)"></div>
    <div class="card">
      <div class="card-title">새 항목 추가</div>
      <div class="grid-form">
        <div><label class="field-label">날짜</label><input type="date" id="ji-date" /></div>
        <div><label class="field-label">내용</label><input type="text" id="ji-desc" placeholder="내용 입력" /></div>
        <div><label class="field-label">금액 (원)</label><input type="number" id="ji-amount" placeholder="0" /></div>
        <div><label class="field-label">고정지출</label>
          <select id="ji-fixed" onchange="updateJiyunCats()"><option value="X">X</option><option value="O">O</option></select>
        </div>
        <div><label class="field-label">세부 구분</label><select id="ji-cat"></select></div>
        <div><label class="field-label">지원금</label>
          <select id="ji-support"><option value="X">X</option><option value="O">O</option></select>
        </div>
        <div><label class="field-label">비고</label><input type="text" id="ji-note" placeholder="선택" /></div>
      </div>
      <button class="add-btn" style="background:var(--jiyun)" onclick="addJiyun()">+ 추가</button>
    </div>
    <div class="card">
      <div class="section-header">
        <span class="s-title" id="ji-count">지윤 소비 내역</span>
        <span class="s-total" style="color:var(--jiyun)" id="ji-total"></span>
      </div>
      <div class="table-wrap"><table><thead><tr>
        <th>날짜</th><th>내용</th><th>금액</th><th>고정</th><th>구분</th><th>지원금</th><th>비고</th><th></th>
      </tr></thead><tbody id="ji-body"></tbody></table></div>
    </div>
  </div>

  <!-- 운혁소비 탭 -->
  <div id="tab-woon" class="tab-panel">
    <div class="card" id="woon-progress-card" style="border-top:3px solid var(--woon)"></div>
    <div class="card">
      <div class="card-title">새 항목 추가</div>
      <div class="grid-form">
        <div><label class="field-label">날짜</label><input type="date" id="wo-date" /></div>
        <div><label class="field-label">내용</label><input type="text" id="wo-desc" placeholder="내용 입력" /></div>
        <div><label class="field-label">금액 (원)</label><input type="number" id="wo-amount" placeholder="0" /></div>
        <div><label class="field-label">구분</label>
          <select id="wo-cat">
            <option>핸드폰</option><option>구독료</option><option>선물</option><option>식비</option>
            <option>카페</option><option>생필품</option><option>공부</option><option>미용</option><option>기타</option><option>필수지출</option>
          </select>
        </div>
        <div><label class="field-label">지원금</label>
          <select id="wo-support"><option value="X">X</option><option value="O">O</option></select>
        </div>
        <div><label class="field-label">비고</label><input type="text" id="wo-note" placeholder="선택" /></div>
      </div>
      <button class="add-btn" style="background:var(--woon)" onclick="addWoon()">+ 추가</button>
    </div>
    <div class="card">
      <div class="section-header">
        <span class="s-title" id="wo-count">운혁 소비 내역</span>
        <span class="s-total" style="color:var(--woon)" id="wo-total"></span>
      </div>
      <div class="table-wrap"><table><thead><tr>
        <th>날짜</th><th>내용</th><th>금액</th><th>구분</th><th>지원금</th><th>비고</th><th></th>
      </tr></thead><tbody id="wo-body"></tbody></table></div>
    </div>
  </div>

  <!-- 파킹통장 탭 -->
  <div id="tab-parking" class="tab-panel">
    <div class="grid-3" id="parking-top" style="margin-bottom:14px"></div>
    <div class="card">
      <div class="card-title">새 항목 추가</div>
      <div class="grid-form">
        <div><label class="field-label">날짜</label><input type="date" id="pk-date" /></div>
        <div><label class="field-label">사람</label>
          <select id="pk-person"><option>공동</option><option>지윤</option><option>운혁</option></select>
        </div>
        <div><label class="field-label">내용</label><input type="text" id="pk-desc" placeholder="내용 입력" /></div>
        <div><label class="field-label">수입 (원)</label><input type="number" id="pk-income" placeholder="0" /></div>
        <div><label class="field-label">지출 (원)</label><input type="number" id="pk-expense" placeholder="0" /></div>
      </div>
      <button class="add-btn" style="background:var(--yellow)" onclick="addParking()">+ 추가</button>
    </div>
    <div class="card">
      <div class="section-header">
        <span class="s-title" id="pk-count">파킹통장 내역</span>
        <span class="s-total" style="color:var(--yellow)" id="pk-balance"></span>
      </div>
      <div class="table-wrap"><table><thead><tr>
        <th>날짜</th><th>사람</th><th>내용</th><th>수입</th><th>지출</th><th>잔액</th><th></th>
      </tr></thead><tbody id="pk-body"></tbody></table></div>
    </div>
  </div>

</div><!-- /content -->

<script>
const API = "https://script.google.com/macros/s/AKfycbyb8knkSF1tSMFaTtAhMZ24jMb9_kgB6WKvYZx3-5-_-kBEGAJaKhgJRhSFUJEMvUBAYA/exec";

// ── 상태 ────────────────────────────────────────────────
let STATE = {
  plan: { income:{woonSalary:0,woonBonus:0,jiyunSalary:0,jiyunBonus:0}, housing:{rent:0,management:0,water:0,internet:0}, transport:{gas:0,carInstall:0,carMaint:0,carInsure:0,carTax:0,carRepair:0,eungpass:0}, living:{food:0,daily:0}, health:{woonInsure:0,jiyunInsure:0,woonSoccer:0,woonPilates:0,jiyunPilates:0}, savings:{woonJT:0,jiyunJT:0}, pocket:{woon:0,jiyun:0} },
  living: [], jiyun: [], woon: [], parking: []
};
let planSaveTimer = null;

// ── 유틸 ────────────────────────────────────────────────
const fmt = n => (Number(n)||0).toLocaleString('ko-KR');
const num = v => Number(String(v).replace(/,/g,''))||0;
const today = () => new Date().toISOString().slice(0,10);
const sum = (arr, key) => arr.reduce((s,r) => s+num(r[key]||0), 0);

// ── API 호출 ────────────────────────────────────────────
async function apiGet(params) {
  const url = API + '?' + new URLSearchParams(params);
  const r = await fetch(url);
  return r.json();
}
async function apiPost(body) {
  const r = await fetch(API, { method:'POST', body: JSON.stringify(body) });
  return r.json();
}

// ── 전체 로드 ───────────────────────────────────────────
async function loadAll() {
  setSyncStatus('🔄 동기화 중...');
  try {
    const res = await apiGet({ action: 'readAll' });
    if (!res.ok) throw new Error(res.message);
    const d = res.data;

    // 계획 파싱
    if (d.plan && d.plan.length > 0) {
      const p = JSON.parse(JSON.stringify(STATE.plan));
      d.plan.forEach(row => {
        const sec = row['항목'], key = row['소항목'], val = num(row['금액']);
        if (p[sec] && key in p[sec]) p[sec][key] = val;
      });
      STATE.plan = p;
    }
    STATE.living  = d.living  || [];
    STATE.jiyun   = d.jiyun   || [];
    STATE.woon    = d.woon    || [];
    STATE.parking = d.parking || [];

    renderAll();
    setSyncStatus('✅ ' + new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'}) + ' 동기화됨');
  } catch(e) {
    setSyncStatus('⚠️ 연결 오류: ' + e.message);
  }
  document.getElementById('loading').style.display = 'none';
}

function setSyncStatus(msg) {
  document.getElementById('sync-status').textContent = msg;
}

// ── 탭 전환 ─────────────────────────────────────────────
function switchTab(id) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + id).classList.add('active');
  event.target.classList.add('active');
}

// ── 전체 렌더 ───────────────────────────────────────────
function renderAll() {
  renderSummary();
  renderPlan();
  renderLiving();
  renderJiyun();
  renderWoon();
  renderParking();
}

// ── 요약 ────────────────────────────────────────────────
function renderSummary() {
  const p = STATE.plan;
  const totalIncome = num(p.income.woonSalary)+num(p.income.woonBonus)+num(p.income.jiyunSalary)+num(p.income.jiyunBonus);

  const livUsed = sum(STATE.living,'금액');
  const livPlan = num(p.living.food)+num(p.living.daily);
  const livSupport = STATE.living.filter(r=>r['지원금여부']==='O').reduce((s,r)=>s+num(r['금액']),0);

  const jiPlan = num(p.housing.rent)+num(p.housing.management)+num(p.housing.water)+num(p.housing.internet)+num(p.transport.eungpass)+num(p.living.food)+num(p.living.daily)+num(p.health.jiyunInsure)+num(p.health.jiyunPilates)+num(p.savings.jiyunJT)+num(p.pocket.jiyun);
  const jiUsed = sum(STATE.jiyun,'금액');
  const jiSupport = STATE.jiyun.filter(r=>r['지원금여부']==='O').reduce((s,r)=>s+num(r['금액']),0);

  const woPlan = num(p.transport.gas)+num(p.transport.carInstall)+num(p.transport.carMaint)+num(p.health.woonInsure)+num(p.health.woonSoccer)+num(p.health.woonPilates)+num(p.savings.woonJT)+num(p.pocket.woon);
  const woUsed = sum(STATE.woon,'금액');
  const woSupport = STATE.woon.filter(r=>r['지원금여부']==='O').reduce((s,r)=>s+num(r['금액']),0);

  const pkRows = STATE.parking;
  const pkBal = pkRows.length > 0 ? num(pkRows[pkRows.length-1]['잔액']) : 0;
  const pkIn  = pkRows.reduce((s,r)=>s+num(r['수입']),0);
  const pkOut = pkRows.reduce((s,r)=>s+num(r['지출']),0);

  document.getElementById('summary-top').innerHTML = `
    ${amountCardHTML('이번달 수입', totalIncome, 'var(--green)', 'var(--green-light)')}
    ${amountCardHTML('생활비 목표', livPlan, 'var(--accent)', 'var(--accent-light)')}
    ${amountCardHTML('파킹통장 잔액', pkBal, 'var(--yellow)', 'var(--yellow-light)', `입금 ${fmt(pkIn)}원 / 출금 ${fmt(pkOut)}원`)}
  `;

  document.getElementById('summary-cards').innerHTML = `
    <div class="card" style="border-top:3px solid var(--accent)">
      <div class="card-title">🏠 생활비 현황</div>
      ${progressHTML(livUsed, livPlan, 'var(--accent)')}

      <div style="margin-top:10px;font-size:12px;color:var(--sub)">지원금 사용: <strong style="color:var(--jiyun)">${fmt(jiSupport)}원</strong> / 실지출: <strong>${fmt(jiUsed-jiSupport)}원</strong></div>
    </div>
    <div class="card" style="border-top:3px solid var(--woon)">
      <div class="card-title">💙 운혁 소비 현황</div>
      ${progressHTML(woUsed, woPlan, 'var(--woon)')}
      <div style="margin-top:10px;font-size:12px;color:var(--sub)">지원금 사용: <strong style="color:var(--woon)">${fmt(woSupport)}원</strong> / 실지출: <strong>${fmt(woUsed-woSupport)}원</strong></div>
    </div>
    <div class="card" style="border-top:3px solid var(--yellow)">
      <div class="card-title">🏦 파킹통장 현황</div>
      <div class="grid-2" style="margin-bottom:10px">
        <div style="background:var(--green-light);border-radius:8px;padding:10px 12px;text-align:center"><div style="font-size:11px;color:var(--sub)">총 입금</div><div style="font-weight:700;color:var(--green)">${fmt(pkIn)}원</div></div>
        <div style="background:var(--red-light);border-radius:8px;padding:10px 12px;text-align:center"><div style="font-size:11px;color:var(--sub)">총 출금</div><div style="font-weight:700;color:var(--red)">${fmt(pkOut)}원</div></div>
      </div>
      <div style="text-align:center;font-weight:800;font-size:18px;color:var(--yellow)">잔액 ${fmt(pkBal)}원</div>
    </div>
  `;
}

function amountCardHTML(label, amount, color, bg, sub='') {
  return `<div class="amount-card" style="background:${bg};border-left:4px solid ${color}">
    <div class="label">${label}</div>
    <div class="value" style="color:${color}">${fmt(amount)}원</div>
    ${sub ? `<div class="sub">${sub}</div>` : ''}
  </div>`;
}

function progressHTML(used, total, color) {
  const pct = total > 0 ? Math.min(100, Math.round(used/total*100)) : 0;
  const barColor = pct > 90 ? 'var(--red)' : pct > 70 ? 'var(--yellow)' : color;
  return `
    <div class="progress-info"><span>${fmt(used)}원 사용</span><span>${pct}%</span></div>
    <div class="progress-bar"><div class="progress-fill" style="width:${pct}%;background:${barColor}"></div></div>
    <div class="progress-sub">목표 ${fmt(total)}원 | 잔여 ${fmt(Math.max(0,total-used))}원</div>
  `;
}

// ── 계획 ────────────────────────────────────────────────
function renderPlan() {
  const p = STATE.plan;
  const totalIncome = num(p.income.woonSalary)+num(p.income.woonBonus)+num(p.income.jiyunSalary)+num(p.income.jiyunBonus);
  const housingSum  = Object.values(p.housing).reduce((s,v)=>s+num(v),0);
  const transSum    = Object.values(p.transport).reduce((s,v)=>s+num(v),0);
  const livingSum   = Object.values(p.living).reduce((s,v)=>s+num(v),0);
  const healthSum   = Object.values(p.health).reduce((s,v)=>s+num(v),0);
  const savingsSum  = Object.values(p.savings).reduce((s,v)=>s+num(v),0);
  const pocketSum   = Object.values(p.pocket).reduce((s,v)=>s+num(v),0);
  const totalExp    = housingSum+transSum+livingSum+healthSum+savingsSum+pocketSum;
  const leftover    = totalIncome - totalExp;

  document.getElementById('plan-content').innerHTML = `
    ${planSection('📥 수입', totalIncome, 'var(--green)', [
      planRow('income','woonSalary','운혁 급여'),planRow('income','woonBonus','운혁 인센티브'),
      planRow('income','jiyunSalary','지윤 급여'),planRow('income','jiyunBonus','지윤 인센티브'),
    ], true)}
    ${planSection('🏠 주거비', housingSum, '', [
      planRow('housing','rent','임대료'),planRow('housing','management','관리비'),
      planRow('housing','water','정수기'),planRow('housing','internet','인터넷'),
    ])}
    ${planSection('🚗 교통비', transSum, '', [
      planRow('transport','gas','기름값'),planRow('transport','carInstall','차 할부금'),
      planRow('transport','carMaint','차 유지비'),planRow('transport','carInsure','차 보험료'),
      planRow('transport','carTax','차 세금'),planRow('transport','carRepair','차 수리비'),
      planRow('transport','eungpass','이응패스'),
    ])}
    ${planSection('🍚 식비 및 생활비', livingSum, '', [
      planRow('living','food','식생활비'),planRow('living','daily','생필품'),
    ])}
    ${planSection('💊 건강 및 보험료', healthSum, '', [
      planRow('health','woonInsure','운혁 보험'),planRow('health','jiyunInsure','지윤 보험'),
      planRow('health','woonSoccer','운혁 축구'),planRow('health','woonPilates','운혁 필라테스'),
      planRow('health','jiyunPilates','지윤 필라테스'),
    ])}
    ${planSection('💰 저축', savingsSum, '', [
      planRow('savings','woonJT','운혁 주택청약'),planRow('savings','jiyunJT','지윤 주택청약'),
    ])}
    ${planSection('💳 용돈', pocketSum, '', [
      planRow('pocket','woon','운혁'),planRow('pocket','jiyun','지윤'),
    ])}
    <div class="card">
      <div class="result-row"><span>총 수입</span><span style="color:var(--green);font-weight:700">${fmt(totalIncome)}원</span></div>
      <div class="result-row"><span>총 지출</span><span style="color:var(--red);font-weight:700">${fmt(totalExp)}원</span></div>
      <div class="result-row total"><span>파킹통장으로 이동 (저축)</span><span style="color:${leftover<0?'var(--red)':'var(--yellow)'};font-weight:800">${fmt(leftover)}원</span></div>
    </div>
  `;
}

function planSection(title, total, color, rows, isIncome=false) {
  return `<div class="card">
    <div class="section-header">
      <span class="s-title">${title}</span>
      <span class="s-total" style="color:${color||'var(--accent)'}">${fmt(total)}원</span>
    </div>
    <div style="display:grid;grid-template-columns:${isIncome?'1fr 1fr':'1fr'};gap:0 16px">
      ${rows.join('')}
    </div>
  </div>`;
}

function planRow(sec, key, label) {
  const val = STATE.plan[sec][key] || '';
  return `<div class="plan-row">
    <span>${label}</span>
    <div class="amount-wrap">
      <input type="number" value="${val}" placeholder="0" onchange="updatePlan('${sec}','${key}',this.value)" oninput="updatePlan('${sec}','${key}',this.value)" />
      <span class="won">원</span>
    </div>
  </div>`;
}

function updatePlan(sec, key, val) {
  STATE.plan[sec][key] = num(val);
  clearTimeout(planSaveTimer);
  planSaveTimer = setTimeout(async () => {
    setSyncStatus('☁️ 저장 중...');
    await apiPost({ action:'savePlan', rows: STATE.plan });
    setSyncStatus('✅ 저장됨');
    renderSummary();
  }, 800);
}

// ── 파킹통장 ────────────────────────────────────────────
function renderParking() {
  const rows = STATE.parking;
  const pkBal = rows.length > 0 ? num(rows[rows.length-1]['잔액']) : 0;
  const pkIn  = rows.reduce((s,r)=>s+num(r['수입']),0);
  const pkOut = rows.reduce((s,r)=>s+num(r['지출']),0);

  document.getElementById('parking-top').innerHTML = `
    ${amountCardHTML('현재 잔액', pkBal, 'var(--yellow)', 'var(--yellow-light)')}
    ${amountCardHTML('총 입금', pkIn, 'var(--green)', 'var(--green-light)')}
    ${amountCardHTML('총 출금', pkOut, 'var(--red)', 'var(--red-light)')}
  `;

  document.getElementById('pk-count').textContent = `파킹통장 내역 (${rows.length}건)`;
  document.getElementById('pk-balance').textContent = `잔액 ${fmt(pkBal)}원`;
  const tbody = document.getElementById('pk-body');
  if (rows.length === 0) { tbody.innerHTML = `<tr><td colspan="7" class="empty">기록이 없습니다.</td></tr>`; return; }
  tbody.innerHTML = [...rows].reverse().map(r => {
    const person = r['사람'];
    const badgeClass = person==='지윤'?'badge-jiyun':person==='운혁'?'badge-woon':'badge-joint';
    return `<tr>
      <td>${r['날짜']}</td>
      <td><span class="badge ${badgeClass}">${person}</span></td>
      <td>${r['내용']}</td>
      <td>${r['수입']?`<span style="color:var(--green)">+${fmt(r['수입'])}원</span>`:'-'}</td>
      <td>${r['지출']?`<span style="color:var(--red)">-${fmt(r['지출'])}원</span>`:'-'}</td>
      <td><strong>${fmt(r['잔액'])}원</strong></td>
      <td><button class="del-btn" onclick="deleteParking('${r['id']}')">삭제</button></td>
    </tr>`;
  }).join('');
}

async function addParking() {
  const desc = document.getElementById('pk-desc').value.trim();
  if (!desc) { alert('내용을 입력해주세요.'); return; }
  const income  = num(document.getElementById('pk-income').value);
  const expense = num(document.getElementById('pk-expense').value);
  const prevBal = STATE.parking.length > 0 ? num(STATE.parking[STATE.parking.length-1]['잔액']) : 0;
  const newBal  = prevBal + income - expense;
  const row = {
    id: Date.now(), 날짜: document.getElementById('pk-date').value,
    사람: document.getElementById('pk-person').value, 내용: desc,
    수입: income||'', 지출: expense||'', 잔액: newBal
  };
  setSyncStatus('☁️ 저장 중...');
  await apiPost({ action:'append', sheet:'파킹통장', row });
  STATE.parking.push(row);
  document.getElementById('pk-desc').value=''; document.getElementById('pk-income').value=''; document.getElementById('pk-expense').value='';
  renderParking(); renderSummary();
  setSyncStatus('✅ 저장됨');
}

async function deleteParking(id) {
  if (!confirm('삭제할까요?')) return;
  setSyncStatus('☁️ 저장 중...');
  STATE.parking = STATE.parking.filter(r=>String(r['id'])!==String(id));
  // 잔액 재계산
  let bal = 0;
  STATE.parking = STATE.parking.map(r => { bal = bal + num(r['수입']) - num(r['지출']); return {...r, 잔액: bal}; });
  await apiPost({ action:'updateParking', sheet:'파킹통장', rows: STATE.parking });
  renderParking(); renderSummary();
  setSyncStatus('✅ 저장됨');
}
